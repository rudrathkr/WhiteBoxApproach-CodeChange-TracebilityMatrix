<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1500" viewBox="0 0 2200 1500" role="img" aria-labelledby="title desc">
  <title id="title">WhiteBox Traceability in Action Workflow</title>
  <desc id="desc">Workflow diagram showing how frontend and backend code changes are captured, mapped to tests, analyzed for impact, selectively run, and reused by the next run.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaf5"/>
      <stop offset="0.58" stop-color="#f8f5ee"/>
      <stop offset="1" stop-color="#f3efe6"/>
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe6f0"/>
      <stop offset="1" stop-color="#f8c2d8"/>
    </linearGradient>
    <linearGradient id="yellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff3bd"/>
      <stop offset="1" stop-color="#f7d96d"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9edff"/>
      <stop offset="1" stop-color="#9cc8ea"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ddf7e7"/>
      <stop offset="1" stop-color="#a9dfbd"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ead8ff"/>
      <stop offset="1" stop-color="#c6a0e8"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffe2bd"/>
      <stop offset="1" stop-color="#f4b46a"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-18%" width="130%" height="136%">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#3f3a35" flood-opacity="0.22"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-14%" width="120%" height="128%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#534741" flood-opacity="0.16"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 14 14" refX="11" refY="7" markerWidth="14" markerHeight="14" orient="auto-start-reverse">
      <path d="M1,1 L13,7 L1,13 Z" fill="#5c8bb4"/>
    </marker>
    <marker id="arrowPink" viewBox="0 0 14 14" refX="11" refY="7" markerWidth="14" markerHeight="14" orient="auto-start-reverse">
      <path d="M1,1 L13,7 L1,13 Z" fill="#c45a86"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 14 14" refX="11" refY="7" markerWidth="14" markerHeight="14" orient="auto-start-reverse">
      <path d="M1,1 L13,7 L1,13 Z" fill="#3c8f61"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 14 14" refX="11" refY="7" markerWidth="14" markerHeight="14" orient="auto-start-reverse">
      <path d="M1,1 L13,7 L1,13 Z" fill="#8a5aa6"/>
    </marker>
    <style>
      .title { font: 800 76px Arial, Helvetica, sans-serif; fill: #111; letter-spacing: 0; }
      .subtitle { font: 500 28px Arial, Helvetica, sans-serif; fill: #38322e; letter-spacing: 0; }
      .boxTitle { font: 800 35px Arial, Helvetica, sans-serif; fill: #111; letter-spacing: 0; }
      .boxTitleSmall { font: 800 30px Arial, Helvetica, sans-serif; fill: #111; letter-spacing: 0; }
      .boxTitleWhite { font: 800 35px Arial, Helvetica, sans-serif; fill: #fff; letter-spacing: 0; }
      .body { font: 500 27px Arial, Helvetica, sans-serif; fill: #171717; letter-spacing: 0; }
      .bodySmall { font: 500 24px Arial, Helvetica, sans-serif; fill: #222; letter-spacing: 0; }
      .bodyTiny { font: 500 20px Arial, Helvetica, sans-serif; fill: #2a2a2a; letter-spacing: 0; }
      .label { font: 800 21px Arial, Helvetica, sans-serif; fill: #fff; letter-spacing: 0; }
      .mono { font: 700 22px "Courier New", monospace; fill: #1c1c1c; letter-spacing: 0; }
      .monoSmall { font: 700 18px "Courier New", monospace; fill: #1c1c1c; letter-spacing: 0; }
      .strokeDark { stroke: #5a5147; stroke-width: 4; }
      .arrow { fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-width: 12; }
      .arrowThin { fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-width: 7; }
    </style>
  </defs>

  <rect width="2200" height="1500" fill="url(#paper)"/>
  <path d="M0,250 C245,185 470,300 680,236 C935,155 1116,260 1390,194 C1666,128 1890,206 2200,150 L2200,0 L0,0 Z" fill="#fff" opacity="0.34"/>
  <path d="M0,1220 C280,1135 458,1240 690,1176 C955,1104 1182,1244 1480,1148 C1720,1070 1932,1148 2200,1098 L2200,1500 L0,1500 Z" fill="#dcebf6" opacity="0.22"/>
  <g opacity="0.12" stroke="#937d68" stroke-width="1">
    <path d="M90 112 L2110 112"/>
    <path d="M90 222 L2110 222"/>
    <path d="M90 332 L2110 332"/>
    <path d="M90 442 L2110 442"/>
    <path d="M90 552 L2110 552"/>
    <path d="M90 662 L2110 662"/>
    <path d="M90 772 L2110 772"/>
    <path d="M90 882 L2110 882"/>
    <path d="M90 992 L2110 992"/>
    <path d="M90 1102 L2110 1102"/>
    <path d="M90 1212 L2110 1212"/>
    <path d="M90 1322 L2110 1322"/>
    <path d="M180 70 L180 1430"/>
    <path d="M330 70 L330 1430"/>
    <path d="M480 70 L480 1430"/>
    <path d="M630 70 L630 1430"/>
    <path d="M780 70 L780 1430"/>
    <path d="M930 70 L930 1430"/>
    <path d="M1080 70 L1080 1430"/>
    <path d="M1230 70 L1230 1430"/>
    <path d="M1380 70 L1380 1430"/>
    <path d="M1530 70 L1530 1430"/>
    <path d="M1680 70 L1680 1430"/>
    <path d="M1830 70 L1830 1430"/>
    <path d="M1980 70 L1980 1430"/>
  </g>

  <text x="1100" y="88" text-anchor="middle" class="title">WhiteBox Traceability in Action</text>
  <text x="1100" y="132" text-anchor="middle" class="subtitle">Frontend + backend code changes stay linked to the exact tests that prove them</text>

  <!-- Top workflow arrows -->
  <path class="arrow" d="M555 278 C586 278 598 278 630 278" stroke="#c45a86" marker-end="url(#arrowPink)"/>
  <path class="arrow" d="M1068 278 C1106 278 1120 278 1152 278" stroke="#5c8bb4" marker-end="url(#arrowBlue)"/>
  <path class="arrow" d="M1630 278 C1670 278 1688 278 1715 278" stroke="#5c8bb4" marker-end="url(#arrowBlue)"/>
  <path class="arrowThin" d="M1392 406 C1392 456 1392 480 1392 520" stroke="#3c8f61" marker-end="url(#arrowGreen)"/>
  <path class="arrowThin" d="M1928 406 C1928 456 1928 480 1928 520" stroke="#5c8bb4" marker-end="url(#arrowBlue)"/>
  <path class="arrowThin" d="M1582 735 C1624 735 1638 735 1670 735" stroke="#5c8bb4" marker-end="url(#arrowBlue)"/>
  <path class="arrowThin" d="M1825 950 C1740 1030 1595 1035 1390 1035 C1145 1035 980 1038 910 1060" stroke="#3c8f61" marker-end="url(#arrowGreen)"/>
  <path class="arrowThin" d="M650 1060 C492 996 376 925 308 865 C206 775 214 650 320 610" stroke="#8a5aa6" marker-end="url(#arrowPurple)"/>
  <path class="arrowThin" d="M1845 1325 C1998 1325 2055 1228 2055 1112 L2055 955" stroke="#8a5aa6" marker-end="url(#arrowPurple)"/>

  <!-- Start -->
  <g filter="url(#shadow)">
    <rect x="70" y="170" width="485" height="260" rx="30" fill="url(#pink)" class="strokeDark"/>
    <text x="105" y="224" class="boxTitle">Start: Code Change</text>
    <text x="105" y="268" class="bodySmall">Developer updates app behavior</text>
    <g transform="translate(105 304)">
      <rect x="0" y="0" width="76" height="46" rx="11" fill="#2c87c9"/>
      <text x="38" y="31" text-anchor="middle" class="label">FE</text>
      <text x="96" y="31" class="monoSmall">frontend-angular/app.js</text>
    </g>
    <g transform="translate(105 362)">
      <rect x="0" y="0" width="76" height="46" rx="11" fill="#6f55b5"/>
      <text x="38" y="31" text-anchor="middle" class="label">BE</text>
      <text x="96" y="24" class="monoSmall">AuthController.java</text>
      <text x="96" y="48" class="monoSmall">OrderController.java</text>
    </g>
  </g>

  <!-- Step 1 -->
  <g filter="url(#shadow)">
    <rect x="630" y="170" width="438" height="260" rx="30" fill="url(#yellow)" class="strokeDark"/>
    <g transform="translate(665 205)">
      <rect x="0" y="0" width="72" height="84" rx="8" fill="#fffef8" stroke="#403b36" stroke-width="4"/>
      <path d="M50 0 L72 22 L50 22 Z" fill="#d9e7f7" stroke="#403b36" stroke-width="4"/>
      <line x1="16" y1="34" x2="54" y2="34" stroke="#6f6a62" stroke-width="4"/>
      <line x1="16" y1="51" x2="56" y2="51" stroke="#6f6a62" stroke-width="4"/>
      <line x1="16" y1="68" x2="42" y2="68" stroke="#6f6a62" stroke-width="4"/>
    </g>
    <text x="762" y="224" class="boxTitle">STEP 1</text>
    <text x="762" y="263" class="boxTitle">Capture Changes</text>
    <text x="665" y="326" class="bodySmall">Input: git diff / PR file list</text>
    <text x="665" y="365" class="bodySmall">Output:</text>
    <text x="760" y="365" class="monoSmall">changed-files.txt</text>
  </g>

  <!-- Step 2 -->
  <g filter="url(#shadow)">
    <rect x="1152" y="170" width="478" height="260" rx="30" fill="url(#green)" class="strokeDark"/>
    <text x="1192" y="224" class="boxTitle">STEP 2</text>
    <text x="1192" y="263" class="boxTitle">Maintain Trace Map</text>
    <text x="1192" y="318" class="bodySmall">Tests are mapped to frontend</text>
    <text x="1192" y="352" class="bodySmall">and backend source files.</text>
    <text x="1192" y="397" class="monoSmall">traceability.json</text>
    <g transform="translate(1510 208)">
      <rect x="0" y="0" width="76" height="94" rx="8" fill="#fff" stroke="#403b36" stroke-width="4"/>
      <text x="38" y="54" text-anchor="middle" class="monoSmall">JSON</text>
      <path d="M52 0 L76 24 L52 24 Z" fill="#d9f1df" stroke="#403b36" stroke-width="4"/>
    </g>
  </g>

  <!-- Step 3 -->
  <g filter="url(#shadow)">
    <rect x="1715" y="170" width="415" height="260" rx="30" fill="url(#blue)" class="strokeDark"/>
    <text x="1760" y="224" class="boxTitle">STEP 3</text>
    <text x="1760" y="263" class="boxTitle">Impact Analysis</text>
    <text x="1760" y="318" class="bodySmall">Compare changed files</text>
    <text x="1760" y="352" class="bodySmall">against mapped code.</text>
    <rect x="1760" y="382" width="245" height="50" rx="12" fill="#ffffff" stroke="#5a5147" stroke-width="3"/>
    <text x="1882" y="414" text-anchor="middle" class="monoSmall">impact-analysis.js</text>
  </g>

  <!-- Mapping matrix -->
  <g filter="url(#softShadow)">
    <rect x="70" y="540" width="850" height="410" rx="30" fill="#f4fbff" stroke="#5d89ad" stroke-width="6"/>
    <rect x="70" y="540" width="850" height="82" rx="30" fill="#5d96c7" stroke="#3e6f98" stroke-width="4"/>
    <text x="112" y="593" class="boxTitleWhite">Test Mapping Matrix</text>
    <text x="112" y="666" class="bodySmall">Each test stores the frontend and backend files it proves.</text>
    <g transform="translate(112 710)">
      <rect x="0" y="0" width="738" height="74" rx="15" fill="#ffffff" stroke="#88aecd" stroke-width="3"/>
      <rect x="20" y="17" width="142" height="40" rx="10" fill="#2c87c9"/>
      <text x="91" y="44" text-anchor="middle" class="label">login test</text>
      <text x="188" y="33" class="monoSmall">app.js + AuthController.java</text>
      <text x="188" y="58" class="monoSmall">validates login flow</text>
    </g>
    <g transform="translate(112 805)">
      <rect x="0" y="0" width="738" height="74" rx="15" fill="#ffffff" stroke="#88aecd" stroke-width="3"/>
      <rect x="20" y="17" width="174" height="40" rx="10" fill="#2c87c9"/>
      <text x="107" y="44" text-anchor="middle" class="label">checkout test</text>
      <text x="220" y="33" class="monoSmall">app.js + OrderController.java</text>
      <text x="220" y="58" class="monoSmall">validates order flow</text>
    </g>
    <g transform="translate(744 631)">
      <circle cx="72" cy="72" r="56" fill="#dfeefb" stroke="#406f98" stroke-width="5"/>
      <rect x="26" y="58" width="92" height="68" rx="17" fill="#f8fbff" stroke="#406f98" stroke-width="5"/>
      <rect x="46" y="30" width="52" height="36" rx="14" fill="#f8fbff" stroke="#406f98" stroke-width="5"/>
      <circle cx="54" cy="90" r="8" fill="#5d96c7"/>
      <circle cx="90" cy="90" r="8" fill="#5d96c7"/>
      <path d="M50 111 Q72 123 94 111" fill="none" stroke="#406f98" stroke-width="5" stroke-linecap="round"/>
      <text x="72" y="166" text-anchor="middle" class="bodyTiny">Mapper</text>
    </g>
  </g>

  <!-- Impact decision -->
  <g filter="url(#softShadow)">
    <rect x="1010" y="540" width="572" height="410" rx="30" fill="#fff8e6" stroke="#c99a2f" stroke-width="6"/>
    <rect x="1010" y="540" width="572" height="82" rx="30" fill="#d0a23e" stroke="#98752a" stroke-width="4"/>
    <text x="1052" y="593" class="boxTitleWhite">Impact Decision</text>
    <text x="1052" y="666" class="bodySmall">A test is impacted when:</text>
    <rect x="1052" y="692" width="488" height="58" rx="14" fill="#ffffff" stroke="#b88a26" stroke-width="3"/>
    <text x="1076" y="728" class="monoSmall">changed-files intersects mapped-files</text>
    <text x="1052" y="792" class="bodySmall">Examples detected on a later run:</text>
    <rect x="1052" y="817" width="430" height="48" rx="12" fill="#ffffff" stroke="#b88a26" stroke-width="3"/>
    <text x="1074" y="849" class="monoSmall">frontend-angular/app.js</text>
    <rect x="1052" y="876" width="430" height="48" rx="12" fill="#ffffff" stroke="#b88a26" stroke-width="3"/>
    <text x="1074" y="908" class="monoSmall">backend/AuthController.java</text>
  </g>

  <!-- Selective execution -->
  <g filter="url(#shadow)">
    <rect x="1670" y="540" width="460" height="410" rx="30" fill="url(#purple)" class="strokeDark"/>
    <rect x="1670" y="540" width="460" height="82" rx="30" fill="#8655a8" stroke="#5e397b" stroke-width="4"/>
    <text x="1712" y="593" class="boxTitleWhite">STEP 4: Selective Run</text>
    <text x="1712" y="668" class="bodySmall">Generate the exact Playwright</text>
    <text x="1712" y="702" class="bodySmall">command for impacted tests.</text>
    <rect x="1712" y="740" width="366" height="58" rx="12" fill="#ffffff" stroke="#5a5147" stroke-width="3"/>
    <text x="1732" y="776" class="monoSmall">npx playwright test --grep</text>
    <rect x="1712" y="822" width="306" height="50" rx="12" fill="#ffffff" stroke="#5a5147" stroke-width="3"/>
    <text x="1732" y="854" class="monoSmall">\"login|checkout\"</text>
    <text x="1712" y="914" class="bodySmall">Output: focused pass/fail signal</text>
  </g>

  <!-- Bottom: next run -->
  <g filter="url(#shadow)">
    <rect x="70" y="1060" width="650" height="270" rx="30" fill="url(#orange)" class="strokeDark"/>
    <rect x="70" y="1060" width="650" height="82" rx="30" fill="#cf7f2e" stroke="#95591d" stroke-width="4"/>
    <text x="112" y="1113" class="boxTitleWhite">STEP 5: Next Run Helps</text>
    <text x="112" y="1190" class="bodySmall">Reads the previous evidence plus the latest diff.</text>
    <text x="112" y="1230" class="bodySmall">Then it expands, narrows, or skips the run set</text>
    <text x="112" y="1270" class="bodySmall">based on fresh frontend/backend changes.</text>
  </g>

  <!-- Evidence store -->
  <g filter="url(#shadow)">
    <rect x="820" y="1060" width="610" height="270" rx="30" fill="url(#green)" class="strokeDark"/>
    <rect x="820" y="1060" width="610" height="82" rx="30" fill="#4d9b68" stroke="#367249" stroke-width="4"/>
    <text x="862" y="1113" class="boxTitleWhite">Traceability Evidence</text>
    <text x="862" y="1190" class="bodySmall">Store mapping, impacted tests, reports,</text>
    <text x="862" y="1230" class="bodySmall">screenshots, logs, and run ID.</text>
    <g transform="translate(862 1252)">
      <rect x="0" y="0" width="96" height="58" rx="9" fill="#ffffff" stroke="#5a5147" stroke-width="3"/>
      <text x="48" y="38" text-anchor="middle" class="monoSmall">MAP</text>
      <rect x="124" y="0" width="96" height="58" rx="9" fill="#ffffff" stroke="#5a5147" stroke-width="3"/>
      <text x="172" y="38" text-anchor="middle" class="monoSmall">RUN</text>
      <rect x="248" y="0" width="96" height="58" rx="9" fill="#ffffff" stroke="#5a5147" stroke-width="3"/>
      <text x="296" y="38" text-anchor="middle" class="monoSmall">LOG</text>
      <rect x="372" y="0" width="96" height="58" rx="9" fill="#ffffff" stroke="#5a5147" stroke-width="3"/>
      <text x="420" y="38" text-anchor="middle" class="monoSmall">SHOT</text>
    </g>
  </g>

  <!-- Outcome -->
  <g filter="url(#softShadow)">
    <rect x="1510" y="1060" width="620" height="270" rx="30" fill="#ffffff" stroke="#b9b0a6" stroke-width="4"/>
    <text x="1552" y="1115" class="boxTitle">What The Next Run Knows</text>
    <text x="1552" y="1175" class="bodySmall">What changed: new frontend/backend file list.</text>
    <text x="1552" y="1215" class="bodySmall">What to run: only mapped impacted tests.</text>
    <text x="1552" y="1255" class="bodySmall">Why: audit trail from source file to test.</text>
  </g>

  <!-- Footer legend -->
  <g filter="url(#softShadow)">
    <rect x="270" y="1390" width="1660" height="56" rx="16" fill="#ffffff" stroke="#c7beb4" stroke-width="3"/>
    <g transform="translate(310 1403)">
      <rect x="0" y="0" width="92" height="30" rx="8" fill="#f9c6da" stroke="#5a5147" stroke-width="2"/>
      <text x="112" y="23" class="bodyTiny">Change input</text>
      <rect x="285" y="0" width="92" height="30" rx="8" fill="#f8dc79" stroke="#5a5147" stroke-width="2"/>
      <text x="397" y="23" class="bodyTiny">Change capture</text>
      <rect x="590" y="0" width="92" height="30" rx="8" fill="#9ec9ed" stroke="#5a5147" stroke-width="2"/>
      <text x="702" y="23" class="bodyTiny">Impact analysis</text>
      <rect x="910" y="0" width="92" height="30" rx="8" fill="#a7dfbd" stroke="#5a5147" stroke-width="2"/>
      <text x="1022" y="23" class="bodyTiny">Evidence store</text>
      <rect x="1235" y="0" width="92" height="30" rx="8" fill="#c6a0e8" stroke="#5a5147" stroke-width="2"/>
      <text x="1347" y="23" class="bodyTiny">Next-run loop</text>
    </g>
  </g>
</svg>
